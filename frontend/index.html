<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskShark | Secure Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="shared/css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="card card-custom p-5 shadow-lg" style="max-width: 400px; width: 100%;">
        <div class="text-center mb-4">
            <h1 class="fw-bold mb-1" style="color: var(--ds-brand-blue);">🦈 DeskShark</h1>
            <p class="text-light opacity-75">Authorized Personnel Only</p>
        </div>
        
        <form id="custom-login-form">
            <div class="mb-3">
                <label class="form-label text-light">Username or Email</label>
                <input type="text" id="identifier" class="form-control text-white border-secondary" style="background-color: #0b0f19;" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-light">Password</label>
                <input type="password" id="password" class="form-control text-white border-secondary" style="background-color: #0b0f19;" required>
            </div>
            
            <button type="submit" class="btn btn-brand w-100 py-2">Secure Login</button>
            <div id="login-error" class="alert alert-danger mt-3 text-center py-2 d-none" style="font-size: 0.9rem;"></div>
        </form>
    </div>

    <script src="shared/js/auth.js"></script>
</body>
</html>
